<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2c2416">
  <title>本棚｜読書アプリ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f8f4eb;
      --bg-card: #fffef9;
      --ink: #2c2416;
      --ink-muted: #6b5d4f;
      --accent: #8b6914;
      --accent-soft: #c4a84a;
      --accent-success: #2d6a3e;
      --border: rgba(139, 105, 20, 0.15);
      --shadow: 0 2px 12px rgba(44, 36, 22, 0.08);
      --shadow-hover: 0 8px 24px rgba(44, 36, 22, 0.12);
      --radius: 12px;
      --font-serif: "Noto Serif JP", "Yu Mincho", "Hiragino Mincho ProN", serif;
      --font-sans: "Zen Kaku Gothic New", "Hiragino Kaku Gothic ProN", sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-sans);
      font-weight: 400;
      line-height: 1.6;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      box-sizing: border-box;
      -webkit-text-size-adjust: 100%;
      -webkit-tap-highlight-color: transparent;
    }
    *, *::before, *::after { box-sizing: inherit; }
    html { font-size: 16px; }
    .app { max-width: 560px; margin: 0 auto; padding: 24px 20px max(32px, env(safe-area-inset-bottom)); min-height: 100vh; }
    .header { margin-bottom: 28px; animation: fadeDown 0.5s ease-out; }
    .header h1 { font-family: var(--font-serif); font-size: 1.5rem; font-weight: 700; margin: 0; letter-spacing: 0.06em; color: var(--ink); }
    .header p { font-size: 0.875rem; color: var(--ink-muted); margin: 6px 0 0; }
    .add-section { margin-bottom: 32px; animation: fadeDown 0.5s ease-out 0.1s both; }
    .add-btn-wrap { position: relative; }
    .add-btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 16px 24px;
      background: linear-gradient(145deg, #a08020 0%, var(--accent) 100%);
      color: #fff; font-family: var(--font-sans); font-size: 1rem; font-weight: 700;
      border: none; border-radius: var(--radius); cursor: pointer; box-shadow: var(--shadow);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      -webkit-appearance: none; appearance: none;
    }
    .add-btn:active { transform: scale(0.98); }
    .add-btn:hover { box-shadow: var(--shadow-hover); }
    .add-btn:focus-visible { outline: 2px solid rgba(255,255,255,0.8); outline-offset: 2px; }
    .add-btn svg { width: 22px; height: 22px; opacity: 0.95; }
    .add-btn-wrap input[type="file"] { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; font-size: 0; }
    .shelf-label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: var(--ink-muted); margin-bottom: 14px; padding-left: 2px; animation: fadeDown 0.5s ease-out 0.15s both; }
    
    .book-list { list-style: none; margin: 0; padding: 0; }
    .book-list.is-loading { min-height: 120px; position: relative; }
    .book-list.is-loading::after { content: ""; position: absolute; left: 50%; top: 48px; width: 32px; height: 32px; margin-left: -16px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
    
    .book-item { 
      animation: fadeUp 0.4s ease-out both; 
      margin-bottom: 12px;
      background: var(--bg-card); 
      border-radius: var(--radius); 
      border: 1px solid var(--border); 
      box-shadow: var(--shadow);
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }
    .book-item:nth-child(1) { animation-delay: 0.05s; }
    .book-item:nth-child(2) { animation-delay: 0.1s; }
    .book-item:nth-child(3) { animation-delay: 0.15s; }
    .book-item:nth-child(4) { animation-delay: 0.2s; }
    .book-item:nth-child(5) { animation-delay: 0.25s; }
    .book-item:nth-child(n+6) { animation-delay: 0.3s; }
    .book-item:hover, .book-item:focus-within {
      border-color: var(--accent-soft); 
      box-shadow: var(--shadow-hover); 
      transform: translateY(-2px);
    }
    
    .book-link {
      display: flex; align-items: center; gap: 16px;
      padding: 18px 20px 12px 20px;
      text-decoration: none; color: inherit;
      border-radius: var(--radius) var(--radius) 0 0;
    }
    .book-link:active { background: rgba(196, 168, 74, 0.08); }
    .book-link:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
    
    .book-icon { width: 44px; height: 56px; background: linear-gradient(145deg, #d4c4a0 0%, #b8a878 100%); border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 1.25rem; color: rgba(44, 36, 22, 0.5); box-shadow: 0 2px 8px rgba(44, 36, 22, 0.15); }
    .book-meta { flex: 1; min-width: 0; position: relative; padding-right: 12px; }
    .book-title { font-family: var(--font-serif); font-size: 1.05rem; font-weight: 600; margin: 0; line-height: 1.4; color: var(--ink); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .book-arrow { flex-shrink: 0; width: 24px; height: 24px; color: var(--accent); opacity: 0.8; transition: transform 0.2s ease; }
    .book-link:hover .book-arrow, .book-link:focus .book-arrow { transform: translateX(4px); }

    .book-actions {
      display: flex; align-items: center;
      padding: 0 16px 16px 80px; gap: 12px;
    }
    .book-actions.has-continue { justify-content: space-between; }
    .book-actions:not(.has-continue) { justify-content: flex-end; }

    .continue-btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 6px 14px; margin: 0;
      background: var(--bg); color: var(--accent);
      font-size: 0.8125rem; font-weight: 700; text-decoration: none;
      border: 1px solid var(--border); border-radius: 20px;
      transition: all 0.2s ease;
    }
    .continue-btn:hover { background: var(--border); }

    .book-menu-btn {
      width: 32px; height: 32px;
      border-radius: 10px; border: 1px solid var(--border);
      background: rgba(255,255,255,0.6); color: var(--ink-muted);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 18px; line-height: 1; cursor: pointer;
      box-shadow: 0 1px 6px rgba(44, 36, 22, 0.08);
      margin-left: auto;
    }
    .book-menu-btn:active { transform: scale(0.98); }
    .book-menu-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    .empty-state { text-align: center; padding: 48px 24px; animation: fadeDown 0.5s ease-out 0.2s both; border: none; background: transparent; box-shadow: none; }
    .empty-state:hover { transform: none; box-shadow: none; border-color: transparent; }
    .empty-state .book-icon { margin: 0 auto 16px; }
    .empty-state p { margin: 0; font-size: 0.9375rem; color: var(--ink-muted); }
    
    .overlay { position: fixed; inset: 0; background: rgba(44, 36, 22, 0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; visibility: hidden; transition: opacity 0.3s ease, visibility 0.3s ease; }
    .overlay.is-visible { opacity: 1; visibility: visible; }
    .overlay-box { background: var(--bg-card); padding: 28px 32px; border-radius: var(--radius); max-width: 90%; text-align: center; box-shadow: var(--shadow-hover); animation: overlayIn 0.3s ease-out; }
    .overlay-box h3 { font-family: var(--font-serif); font-size: 1.125rem; margin: 0 0 12px; color: var(--ink); }
    .overlay-box p { margin: 0; font-size: 0.875rem; color: var(--ink-muted); }
    .overlay.error .overlay-box p.overlay-hint { margin-top: 10px; font-size: 0.8125rem; }
    .spinner { width: 40px; height: 40px; margin: 0 auto 16px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    .overlay.error .spinner { display: none; }
    .overlay.error .overlay-box h3 { color: #a03030; }
    .toast { position: fixed; left: 20px; right: 20px; bottom: max(24px, env(safe-area-inset-bottom)); max-width: 520px; margin: 0 auto; padding: 14px 20px; background: var(--accent-success); color: #fff; font-size: 0.9375rem; font-weight: 500; text-align: center; border-radius: var(--radius); box-shadow: var(--shadow-hover); z-index: 1001; opacity: 0; transform: translateY(12px); visibility: hidden; transition: opacity 0.3s ease, transform 0.3s ease, visibility 0.3s ease; }
    .toast.is-visible { opacity: 1; transform: translateY(0); visibility: visible; }

    .sheet {
      position: fixed;
      inset: 0;
      background: rgba(44, 36, 22, 0.5);
      z-index: 1002;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s ease, visibility 0.2s ease;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 16px 16px max(16px, env(safe-area-inset-bottom));
    }
    .sheet.is-visible { opacity: 1; visibility: visible; }
    .sheet-panel {
      width: 100%;
      max-width: 560px;
      background: var(--bg-card);
      border-radius: 16px;
      box-shadow: var(--shadow-hover);
      border: 1px solid var(--border);
      overflow: hidden;
      transform: translateY(12px);
      transition: transform 0.2s ease;
    }
    .sheet.is-visible .sheet-panel { transform: translateY(0); }
    .sheet-header { padding: 14px 16px; border-bottom: 1px solid var(--border); }
    .sheet-title { margin: 0; font-size: 0.95rem; font-weight: 700; color: var(--ink); }
    .sheet-actions { display: grid; }
    .sheet-btn {
      appearance: none;
      border: none;
      background: transparent;
      padding: 16px;
      font-size: 1rem;
      font-weight: 600;
      text-align: left;
      cursor: pointer;
      color: var(--ink);
      border-bottom: 1px solid var(--border);
    }
    .sheet-btn:active { background: rgba(196, 168, 74, 0.08); }
    .sheet-btn.danger { color: #a03030; }
    .sheet-btn:last-child { border-bottom: none; }

    @keyframes fadeDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes overlayIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (prefers-reduced-motion: reduce) {
      .header, .add-section, .shelf-label, .book-item, .empty-state { animation: none; }
      .book-item:hover, .book-item:focus-within { transform: none; }
      .book-link:hover .book-arrow, .book-link:focus .book-arrow { transform: none; }
    }

    .progress-bar-wrap { width: 100%; height: 6px; background: var(--border); border-radius: 3px; margin-top: 14px; overflow: hidden; }
    .progress-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent-soft), var(--accent)); border-radius: 3px; transition: width 0.4s ease; }
    .progress-phase { font-size: 0.8125rem; color: var(--ink-muted); margin: 8px 0 0; }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>本棚</h1>
      <p>タップして読む・新しいPDFを追加して本棚に並べられます</p>
    </header>
    <section class="add-section">
      <div class="add-btn-wrap">
        <button type="button" class="add-btn" id="addBtn" aria-label="新しいPDFを追加">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" /></svg>
          <span>新しいPDFを追加</span>
        </button>
        <input type="file" id="pdfInput" accept=".pdf" hidden>
      </div>
    </section>
    <p class="shelf-label">登録されている本</p>
    <ul class="book-list" id="bookList">
      <li class="empty-state" id="emptyState">
        <div class="book-icon" aria-hidden="true">&#128218;</div>
        <p>まだ本がありません<br>「新しいPDFを追加」から追加してください</p>
      </li>
    </ul>
  </div>
  <div class="overlay" id="overlay" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="overlayTitle">
    <div class="overlay-box">
      <div class="spinner" aria-hidden="true"></div>
      <h3 id="overlayTitle">処理中です…</h3>
      <p id="overlayMessage">しばらくお待ちください</p>
      <div id="progressBarWrap" style="display:none;">
        <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBarFill"></div></div>
        <p class="progress-phase" id="progressPhase"></p>
      </div>
      <p class="overlay-hint" id="overlayHint" style="display: none;">タップで閉じる</p>
    </div>
  </div>
  <div class="toast" id="toast" aria-live="polite" role="status"></div>
  <div class="sheet" id="sheet" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
    <div class="sheet-panel">
      <div class="sheet-header">
        <p class="sheet-title" id="sheetTitle">操作</p>
      </div>
      <div class="sheet-actions">
        <button class="sheet-btn" id="sheetRename" type="button">名前を変更</button>
        <button class="sheet-btn danger" id="sheetDelete" type="button">削除</button>
        <button class="sheet-btn" id="sheetCancel" type="button">キャンセル</button>
      </div>
    </div>
  </div>
  <script>
    (function () {
      var bookList = document.getElementById("bookList");
      var emptyState = document.getElementById("emptyState");
      var addBtn = document.getElementById("addBtn");
      var pdfInput = document.getElementById("pdfInput");
      var overlay = document.getElementById("overlay");
      var overlayTitle = document.getElementById("overlayTitle");
      var overlayMessage = document.getElementById("overlayMessage");
      var overlayHint = document.getElementById("overlayHint");
      var progressBarWrap = document.getElementById("progressBarWrap");
      var progressBarFill = document.getElementById("progressBarFill");
      var progressPhase = document.getElementById("progressPhase");
      var toast = document.getElementById("toast");
      var sheet = document.getElementById("sheet");
      var sheetTitle = document.getElementById("sheetTitle");
      var sheetRename = document.getElementById("sheetRename");
      var sheetDelete = document.getElementById("sheetDelete");
      var sheetCancel = document.getElementById("sheetCancel");
      var activeBook = null;
      var pollingTimer = null;
      var uploadAbortCtrl = null;

      function showOverlay(title, message) {
        overlayTitle.textContent = title;
        overlayMessage.textContent = message || "";
        overlayHint.style.display = "none";
        overlay.classList.remove("error");
        overlay.classList.add("is-visible");
        overlay.setAttribute("aria-hidden", "false");
      }
      function hideOverlay() {
        overlay.classList.remove("is-visible", "error");
        overlay.setAttribute("aria-hidden", "true");
        resetProgress();
      }

      function showProgress(percent, phase) {
        progressBarWrap.style.display = "";
        progressBarFill.style.width = percent + "%";
        progressPhase.textContent = phase || "";
      }
      function resetProgress() {
        progressBarWrap.style.display = "none";
        progressBarFill.style.width = "0%";
        progressPhase.textContent = "";
      }

      function stopPolling() {
        if (pollingTimer !== null) { clearInterval(pollingTimer); pollingTimer = null; }
        if (uploadAbortCtrl) { uploadAbortCtrl.abort(); uploadAbortCtrl = null; }
      }

      function startPolling(jobId) {
        stopPolling();
        pollingTimer = setInterval(function () {
          fetch("/api/job/" + jobId, { cache: "no-store" })
            .then(function (r) { return r.json(); })
            .then(function (data) {
              if (!data.ok) { return; }
              showProgress(data.percent || 0, data.phase || "");
              if (data.status === "done") {
                stopPolling();
                addBtn.disabled = false;
                hideOverlay();
                showToast("本棚に追加しました");
                loadBooks();
              } else if (data.status === "error") {
                stopPolling();
                addBtn.disabled = false;
                showError(data.error || "処理に失敗しました");
                setTimeout(hideOverlay, 4000);
              }
            })
            .catch(function () {});
        }, 500);
      }
      function showError(message) {
        overlayTitle.textContent = "エラー";
        overlayMessage.textContent = message;
        overlayHint.style.display = "block";
        overlay.classList.add("error", "is-visible");
        overlay.setAttribute("aria-hidden", "false");
      }
      function showToast(text) {
        toast.textContent = text;
        toast.classList.add("is-visible");
        setTimeout(function () { toast.classList.remove("is-visible"); }, 2500);
      }
      function openSheet(book) {
        activeBook = book;
        sheetTitle.textContent = book.title || "操作";
        sheet.classList.add("is-visible");
        sheet.setAttribute("aria-hidden", "false");
      }
      function closeSheet() {
        activeBook = null;
        sheet.classList.remove("is-visible");
        sheet.setAttribute("aria-hidden", "true");
      }
      function escapeHtml(s) { var div = document.createElement("div"); div.textContent = s; return div.innerHTML; }

      function renderBooks(books) {
        bookList.classList.remove("is-loading");
        bookList.innerHTML = "";
        if (!books || books.length === 0) {
          bookList.appendChild(emptyState);
          emptyState.style.display = "";
          return;
        }
        emptyState.style.display = "none";
        books.forEach(function (book) {
          var li = document.createElement("li");
          li.className = "book-item";
          
          var baseUrl = "/book/" + encodeURIComponent(book.id) + "/";
          
          var continueBtnHtml = "";
          var actionClass = "book-actions";
          if (book.last_read && book.last_read !== "index.html") {
              var continueUrl = baseUrl + book.last_read;
              continueBtnHtml = '<a href="' + continueUrl + '" class="continue-btn" aria-label="続きから読む">続きから</a>';
              actionClass += " has-continue";
          }

          li.innerHTML =
            '<a href="' + baseUrl + '" class="book-link">' +
              '<span class="book-icon" aria-hidden="true">&#128214;</span>' +
              '<span class="book-meta">' +
                '<span class="book-title">' + escapeHtml(book.title) + '</span>' +
              '</span>' +
              '<svg class="book-arrow" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" /></svg>' +
            '</a>' +
            '<div class="' + actionClass + '">' +
              continueBtnHtml +
              '<button type="button" class="book-menu-btn" aria-label="メニュー" data-book-id="' + escapeHtml(book.id) + '">…</button>' +
            '</div>';
          bookList.appendChild(li);
        });
      }

      function loadBooks() {
        bookList.classList.add("is-loading");
        emptyState.style.display = "none";
        // API通信結果のブラウザキャッシュを無効化し、常に最新の進行度を取得する
        fetch("/api/books", { cache: "no-store" })
          .then(function (r) { return r.json(); })
          .then(renderBooks)
          .catch(function () { renderBooks([]); });
      }

      addBtn.addEventListener("click", function () { pdfInput.click(); });

      pdfInput.addEventListener("change", function () {
        var file = this.files && this.files[0];
        this.value = "";
        if (!file) return;
        if (!file.name.toLowerCase().endsWith(".pdf")) {
          showError("PDFファイルを選択してください。");
          setTimeout(hideOverlay, 3000);
          return;
        }
        stopPolling();
        addBtn.disabled = true;
        showOverlay("PDFを処理しています…", "ページ数によっては数分かかることがあります");
        uploadAbortCtrl = new AbortController();
        var form = new FormData();
        form.append("pdf", file);
        fetch("/api/add", { method: "POST", body: form, signal: uploadAbortCtrl.signal })
          .then(function (r) { return r.json(); })
          .then(function (data) {
            if (data.ok && data.job_id) {
              startPolling(data.job_id);
            } else {
              addBtn.disabled = false;
              showError(data.error || "処理に失敗しました");
              setTimeout(hideOverlay, 4000);
            }
          })
          .catch(function (err) {
            if (err && err.name === "AbortError") return;
            addBtn.disabled = false;
            hideOverlay();
            showError("通信エラーです。しばらくしてからやり直してください。");
            setTimeout(hideOverlay, 4000);
          });
      });

      overlay.addEventListener("click", function () { if (overlay.classList.contains("error")) hideOverlay(); });

      bookList.addEventListener("click", function (e) {
        var t = e.target;
        if (t && t.classList && t.classList.contains("book-menu-btn")) {
          e.preventDefault();
          e.stopPropagation();
          var id = t.getAttribute("data-book-id");
          var li = t.closest(".book-item");
          var titleEl = li ? li.querySelector(".book-title") : null;
          openSheet({ id: id, title: titleEl ? titleEl.textContent : "" });
        }
      });

      sheetCancel.addEventListener("click", closeSheet);
      sheet.addEventListener("click", function (e) {
        if (e.target === sheet) closeSheet();
      });

      sheetRename.addEventListener("click", function () {
        if (!activeBook) return;

        var newTitle = prompt("新しいタイトル", activeBook.title || "");
        if (newTitle === null) return;

        newTitle = (newTitle || "").trim();
        if (!newTitle) { showToast("タイトルが空です"); return; }

        var bookId = activeBook.id;

        closeSheet();

        fetch("/api/rename", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ id: bookId, title: newTitle })
        }).then(function (r) { return r.json(); })
          .then(function (data) {
            if (data.ok) { showToast("名前を変更しました"); loadBooks(); }
            else { showToast(data.error || "変更に失敗しました"); }
          })
          .catch(function () { showToast("通信エラーです"); });
      });

      sheetDelete.addEventListener("click", function () {
        if (!activeBook) return;
        var ok = confirm("この本を削除しますか？\n（生成されたHTMLも削除されます）");
        if (!ok) return;

        var bookId = activeBook.id;

        closeSheet();

        fetch("/api/delete", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ id: bookId })
        }).then(function (r) { return r.json(); })
          .then(function (data) {
            if (data.ok) { showToast("削除しました"); loadBooks(); }
            else { showToast(data.error || "削除に失敗しました"); }
          })
          .catch(function () { showToast("通信エラーです"); });
      });

      // ブラウザの「戻る」でbfcacheから復元された際のリスト再描画
      window.addEventListener("pageshow", function (e) {
        if (e.persisted) {
          loadBooks();
        }
      });

      loadBooks();
    })();
  </script>
</body>
</html>
